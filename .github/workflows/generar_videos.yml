name: Generar videos por día

on:
  workflow_dispatch:
    inputs:
      videos_por_dia:
        description: 'Número de videos por día (por defecto: 5)'
        required: true
        default: 5
        type: number
      tema:
        description: 'Tema o "todo" para aleatorio (por defecto: Motivación)'
        required: false
        default: 'Motivación'
        type: string
  schedule:
    - cron: '0 10 * * 0'

jobs:
  generar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install moviepy==1.0.3 pillow requests

      - name: Ejecutar generador semanal
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          python por_dia.py --videos ${{ github.event.inputs.videos_por_dia }} --tema "${{ github.event.inputs.tema }}"

      - name: Subir videos generados
        uses: actions/upload-artifact@v4
        with:
          name: videos-generados
          path: |
            videos-generados.zip
