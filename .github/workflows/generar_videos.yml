name: Generar videos por día

on:
  workflow_dispatch:
    inputs:
      videos_por_dia:
        description: 'Número de videos por día (ej: 5)'
        required: true
        default: 5
        type: number
      tema:
        description: 'Tema o "todo" para aleatorio'
        required: false
        default: 'todo'
        type: string
  schedule:
    - cron: '0 10 * * 0'

jobs:
  generar:
    runs-on: ubuntu-latest

    steps:
      # actions/checkout pasa de v4 a v5
      - name: Clonar repositorio
        uses: actions/checkout@v5

      # actions/setup-python pasa de v5 a v6
      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install moviepy==1.0.3 pillow requests

      - name: Ejecutar generador semanal
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          python por_dia.py --videos ${{ github.event.inputs.videos_por_dia }} --tema "${{ github.event.inputs.tema }}" --zip Videos-generados

      # actions/upload-artifact pasa de v4 a v5
      - name: Subir videos generados
        uses: actions/upload-artifact@v5
        with:
          name: videos-generados
          path: |
            *.zip
